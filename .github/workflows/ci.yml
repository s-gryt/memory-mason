name: CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - hooks/**
      - skills/**/SKILL.md
      - skills/**/references/**
      - rules/memory-mason.md
      - .claude-plugin/plugin.json
      - .claude-plugin/marketplace.json
      - .github/plugin/plugin.json
      - .github/plugin/marketplace.json
      - '*.skill'
      - VERSION
      - gemini-extension.json
      - plugins/memory-mason/.codex-plugin/plugin.json
      - scripts/version-sync.mjs
  pull_request:
    paths:
      - .github/workflows/ci.yml
      - hooks/**
      - skills/**/SKILL.md
      - skills/**/references/**
      - rules/memory-mason.md
      - .claude-plugin/plugin.json
      - .claude-plugin/marketplace.json
      - .github/plugin/plugin.json
      - .github/plugin/marketplace.json
      - '*.skill'
      - VERSION
      - gemini-extension.json
      - plugins/memory-mason/.codex-plugin/plugin.json
      - scripts/version-sync.mjs

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-hooks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hooks
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync manifest versions
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node ../scripts/version-sync.mjs sync

      - name: Check manifest version drift
        if: github.event_name == 'pull_request'
        run: node ../scripts/version-sync.mjs check

      - name: Sync generated SKILL.md copies for validation
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        run: |
          for skill_dir in skills/*; do
            [ -d "$skill_dir" ] || continue
            skill="$(basename "$skill_dir")"

            for dest in ".cursor/skills/${skill}" ".windsurf/skills/${skill}" "plugins/memory-mason/skills/${skill}"; do
              mkdir -p "$dest"
              cp "${skill_dir}/SKILL.md" "${dest}/SKILL.md"

              if [ -d "${skill_dir}/references" ]; then
                mkdir -p "${dest}/references"
                cp "${skill_dir}/references/"* "${dest}/references/"
              fi
            done
          done

      - name: Check generated SKILL.md copies for drift
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        run: |
          failed=0
          for src in skills/*/SKILL.md; do
            skill="$(basename "$(dirname "$src")")"
            for copy in \
              ".cursor/skills/${skill}/SKILL.md" \
              ".windsurf/skills/${skill}/SKILL.md" \
              "plugins/memory-mason/skills/${skill}/SKILL.md"
            do
              if [ ! -f "$copy" ]; then
                echo "MISSING: $copy (expected copy of $src)"
                failed=1
              elif ! diff -q "$src" "$copy" > /dev/null 2>&1; then
                echo "DRIFT: $copy differs from $src"
                diff "$src" "$copy" || true
                failed=1
              fi
            done
          done
          for src in skills/*/references/*; do
            [ -f "$src" ] || continue
            skill="$(basename "$(dirname "$(dirname "$src")")")"
            name="$(basename "$src")"
            for copy in \
              ".cursor/skills/${skill}/references/${name}" \
              ".windsurf/skills/${skill}/references/${name}" \
              "plugins/memory-mason/skills/${skill}/references/${name}"
            do
              if [ ! -f "$copy" ]; then
                echo "MISSING: $copy (expected copy of $src)"
                failed=1
              elif ! diff -q "$src" "$copy" > /dev/null 2>&1; then
                echo "DRIFT: $copy differs from $src"
                diff "$src" "$copy" || true
                failed=1
              fi
            done
          done
          if [ "$failed" -ne 0 ]; then
            echo ""
            echo "Generated skill copies still drift after the CI sync step."
            echo "If this fails, update ci.yml so the sync and drift check cover the same files."
            exit 1
          fi

      - name: Check generated .skill archives for drift
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        run: |
          failed=0
          for src in skills/*; do
            [ -d "$src" ] || continue
            skill="$(basename "$src")"
            archive="${skill}.skill"

            if [ ! -f "$archive" ]; then
              echo "MISSING: $archive (expected archive for $src)"
              failed=1
              continue
            fi

            extract_dir="$(mktemp -d)"
            unzip -qq "$archive" -d "$extract_dir"

            if ! diff -qr "$src" "$extract_dir" > /dev/null 2>&1; then
              echo "DRIFT: $archive differs from $src"
              diff -qr "$src" "$extract_dir" || true
              failed=1
            fi

            rm -rf "$extract_dir"
          done

          if [ "$failed" -ne 0 ]; then
            echo ""
            echo "Generated .skill archives still drift after the CI sync step."
            echo "If this fails, update ci.yml so the sync and drift check cover the same archive sources."
            exit 1
          fi

      - name: Install hook dependencies
        run: npm ci

      - name: Run hook lint
        run: npm run lint

      - name: Run hook dupes
        run: npm run dupes

      - name: Run hook coverage
        run: npm run coverage

      - name: Stage coverage summary for badge action
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p ../coverage
          cp reports/coverage/coverage-summary.json ../coverage/coverage-summary.json

      - name: Update Coverage Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: we-cli/coverage-badge-action@main

  sync-generated-artifacts:
    needs: test-hooks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release tag
        id: release-tag
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          before="$EVENT_BEFORE"
          after="$EVENT_SHA"

          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            version="$(tr -d '\r\n' < VERSION)"
            echo "tag=v${version}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$before" "$after" | grep -qx 'VERSION'; then
            version="$(tr -d '\r\n' < VERSION)"
            echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Sync SKILL.md copies
        run: |
          for skill_dir in skills/*; do
            [ -d "$skill_dir" ] || continue
            skill="$(basename "$skill_dir")"

            for dest in ".cursor/skills/${skill}" ".windsurf/skills/${skill}" "plugins/memory-mason/skills/${skill}"; do
              mkdir -p "$dest"
              cp "${skill_dir}/SKILL.md" "${dest}/SKILL.md"

              if [ -d "${skill_dir}/references" ]; then
                mkdir -p "${dest}/references"
                cp "${skill_dir}/references/"* "${dest}/references/"
              fi
            done
          done

      - name: Build .skill ZIP archives
        run: |
          rm -f ./*.skill
          for skill_dir in skills/*; do
            [ -d "$skill_dir" ] || continue
            skill="$(basename "$skill_dir")"
            cd "$skill_dir"
            zip -r "../../${skill}.skill" .
            cd ../..
          done

      - name: Sync auto-activation rules
        run: |
          mkdir -p .clinerules
          cp rules/memory-mason.md .clinerules/memory-mason.md

          mkdir -p .cursor/rules
          printf '%s\n' '---' 'description: "Memory Mason knowledge base"' 'alwaysApply: true' '---' '' > .cursor/rules/memory-mason.mdc
          cat rules/memory-mason.md >> .cursor/rules/memory-mason.mdc

          mkdir -p .windsurf/rules
          printf '%s\n' '---' 'trigger: always_on' '---' '' > .windsurf/rules/memory-mason.md
          cat rules/memory-mason.md >> .windsurf/rules/memory-mason.md

          python3 - <<'PYEOF'
          import pathlib
          import re

          content = pathlib.Path('.github/copilot-instructions.md').read_text(encoding='utf-8')
          body = pathlib.Path('rules/memory-mason.md').read_text(encoding='utf-8').rstrip('\n')
          block = f'<!-- BEGIN memory-mason -->\n{body}\n<!-- END memory-mason -->'

          if '<!-- BEGIN memory-mason -->' in content:
              updated = re.sub(
                  r'<!-- BEGIN memory-mason -->.*?<!-- END memory-mason -->',
                  block,
                  content,
                  flags=re.DOTALL,
              )
          else:
              updated = content.rstrip('\n') + '\n\n' + block + '\n'

          pathlib.Path('.github/copilot-instructions.md').write_text(updated, encoding='utf-8')
          PYEOF

      - name: Sync manifest versions
        run: node scripts/version-sync.mjs sync

      - name: Commit and push if changed
        run: |
          git add \
            .cursor/skills/ \
            .windsurf/skills/ \
            plugins/memory-mason/skills/ \
            *.skill \
            .clinerules/memory-mason.md \
            .cursor/rules/memory-mason.mdc \
            .windsurf/rules/memory-mason.md \
            .github/copilot-instructions.md \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            .github/plugin/plugin.json \
            .github/plugin/marketplace.json \
            gemini-extension.json \
            plugins/memory-mason/.codex-plugin/plugin.json \
            hooks/package.json \
            hooks/package-lock.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync skills to agent locations [skip ci]"
          git push

      - name: Create release tag
        if: steps.release-tag.outputs.tag != ''
        run: |
          tag="${{ steps.release-tag.outputs.tag }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists remotely"
            exit 0
          fi

          git tag -d "${tag}" >/dev/null 2>&1 || true
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"
